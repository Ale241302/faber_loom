# Configuración alembic (STUB).
#
# El bootstrap LOCAL de esta entrega usa /sql (psql), NO alembic. Este stub
# queda listo para generar migraciones reales más adelante. La URL real la
# inyecta env.py desde Settings (DATABASE_URL); el valor de aquí es solo un
# placeholder y no se usa para conectar.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# Placeholder; env.py sobreescribe con settings.DATABASE_URL en runtime.
sqlalchemy.url = postgresql+asyncpg://faberloom:faberloom@localhost:5432/faberloom

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
